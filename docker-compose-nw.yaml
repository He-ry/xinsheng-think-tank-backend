services:
  think-tank-backend:
    image: docker-hub.xinsheng-ai.cn/xinsheng-think-tank/xinsheng-think-tank-backend:latest
    container_name: xinsheng-think-tank-backend
    ports:
      - "8080:8080"
    volumes:
      - ./upload:/app/upload
      - ./application.yml:/app/config/application.yml:ro
    environment:
      - SPRING_DATASOURCE_DYNAMIC_DATASOURCE_MASTER_URL=jdbc:mysql://192.168.1.111:3306/xinsheng-think-tank?useUnicode=true&characterEncoding=utf-8&serverTimezone=GMT%2B8
      - SPRING_DATASOURCE_DYNAMIC_DATASOURCE_MASTER_USERNAME=${MYSQL_USER:-root}
      - SPRING_DATASOURCE_DYNAMIC_DATASOURCE_MASTER_PASSWORD=${MYSQL_PASSWORD:-123456}
      - JWT_SECRET=${JWT_SECRET:-learn-xinsheng-think-tank-super-secret-key-32bytes-minimum}
      - MCP_API_KEY=${MCP_API_KEY:-changeme-mcp-api-key}
      - HOST=${HOST:-http://localhost:8080}
      - MAXKB_HOST=${MAXKB_HOST:-http://192.168.1.111:8080}
      - MAXKB_API-KEY=${MAXKB_API_KEY:-your-maxkb-api-key}
    restart: unless-stopped
