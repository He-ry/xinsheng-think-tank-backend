stages:
  - build
  - deploy

build:
  stage: build

  image: docker:26.1

  tags:
    - docker

  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG =~ /^v/

  script:
    - export VERSION="latest"

    - docker version
    - ls -l /var/run/docker.sock

    # 构建镜像
    - docker build -t xinsheng-think-tank-backend:$VERSION .

    # 登录 Harbor
    - docker login docker-hub.xinsheng-ai.cn -u admin -p "xinsheng@jerrylu..."

    # Harbor 镜像名
    - export IMAGE_NAME=docker-hub.xinsheng-ai.cn/xinsheng-think-tank/xinsheng-think-tank-backend:$VERSION

    - echo "IMAGE_NAME=$IMAGE_NAME"

    # 打 tag
    - docker tag xinsheng-think-tank-backend:$VERSION $IMAGE_NAME

    # 推送 Harbor
    - docker push $IMAGE_NAME

    # 导出离线镜像
    - docker save xinsheng-think-tank-backend:$VERSION | gzip -9 > xinsheng-think-tank-backend-$VERSION.tar.gz

    - ls -lh *.tar.gz

deploy:
  stage: deploy

  tags:
    - deploy

  script:
    - cd /opt/xinsheng-think-tank-backend
    - docker compose pull
    - docker compose up -d

  only:
    - main
